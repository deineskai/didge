name: Build and Push Images to GHCR

on:
  push:
    branches:
      - master
      - staging

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_PREFIX: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Set Tag
        id: vars
        run: |
          if [[ "${GITHUB_REF}" == "refs/heads/master" ]]; then
            echo "TAG=latest" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_REF}" == "refs/heads/staging" ]]; then
            echo "TAG=staging" >> $GITHUB_OUTPUT
          fi
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- BUILD USER SERVICE ---
      - name: Build and push User Service
        uses: docker/build-push-action@v5
        with:
          context: ./user-service
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/didge-user-service:${{ steps.vars.outputs.TAG }}

      # --- BUILD HOUSEHOLD SERVICE ---
      - name: Build and push Household Service
        uses: docker/build-push-action@v5
        with:
          context: ./household-service
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/didge-household-service:${{ steps.vars.outputs.TAG }}

      # --- BUILD FRONTEND ---
      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./didge-frontend
          push: true
          # Hier geben wir unser Build-Argument mit
          build-args: |
            BUILD_ENV=production
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/didge-frontend:${{ steps.vars.outputs.TAG }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      # Checkout the code to get access to docker-compose.deploy.yml
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set Env Vars
        id: envs
        run: |
          if [[ "${GITHUB_REF}" == "refs/heads/master" ]]; then
            echo "DIR=prod" >> $GITHUB_OUTPUT
            echo "IMAGE_TAG=latest" >> $GITHUB_OUTPUT
            echo "USER_SERVICE_PORT=8001" >> $GITHUB_OUTPUT
            echo "HOUSEHOLD_SERVICE_PORT=8002" >> $GITHUB_OUTPUT
            echo "FRONTEND_PORT=8000" >> $GITHUB_OUTPUT
          elif [[ "${GITHUB_REF}" == "refs/heads/staging" ]]; then
            echo "DIR=staging" >> $GITHUB_OUTPUT
            echo "IMAGE_TAG=staging" >> $GITHUB_OUTPUT
            echo "USER_SERVICE_PORT=9001" >> $GITHUB_OUTPUT
            echo "HOUSEHOLD_SERVICE_PORT=9002" >> $GITHUB_OUTPUT
            echo "FRONTEND_PORT=9000" >> $GITHUB_OUTPUT

      # Copy the deployment configuration to the server
      - name: Copy docker-compose.deploy.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: docker-compose.deploy.yml
          target: /home/gh-deployer/didge/${{ steps.envs.outputs.DIR }}/docker-compose.deploy.yml

      # SSH into the server and deploy the new images
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/gh-deployer/didge/${{ steps.envs.outputs.DIR }}

            export IMAGE_TAG=${{ steps.envs.outputs.IMAGE_TAG }}
            export USER_SERVICE_PORT=${{ steps.envs.outputs.USER_SERVICE_PORT }}
            export HOUSEHOLD_SERVICE_PORT=${{ steps.envs.outputs.HOUSEHOLD_SERVICE_PORT }}
            export FRONTEND_PORT=${{ steps.envs.outputs.FRONTEND_PORT }}

            docker compose -p didge-${{ steps.envs.outputs.DIR }} -f docker-compose.deploy.yml pull
            docker compose -p didge-${{ steps.envs.outputs.DIR }} -f docker-compose.deploy.yml up -d --remove-orphans
            docker image prune -f
