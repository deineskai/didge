<div class="flex h-screen bg-gray-100">

  <!-- ===================== DESKTOP SIDEBAR ===================== -->
  <nav class="hidden md:flex flex-col w-64 bg-indigo-950 text-indigo-200 shrink-0">

    <!-- Username -->
    <div class="px-6 py-6 border-b border-indigo-800">
      <p class="text-xs uppercase tracking-widest text-indigo-400 mb-1">Logged in as</p>
      <p class="text-white font-semibold truncate">{{ username }}</p>
    </div>

    <!-- Main nav -->
    <ul class="flex flex-col gap-1 px-3 py-4 flex-1">
      <li>
        <a routerLink="/app/discover" routerLinkActive="bg-indigo-800 text-white"
          class="flex items-center gap-3 px-3 py-2.5 rounded-lg transition hover:bg-indigo-800 hover:text-white">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>
          Discover
        </a>
      </li>
      <li>
        <a routerLink="/app/saved" routerLinkActive="bg-indigo-800 text-white"
          class="flex items-center gap-3 px-3 py-2.5 rounded-lg transition hover:bg-indigo-800 hover:text-white">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
          Saved
        </a>
      </li>
      <li>
        <a routerLink="/app/meal-plan" routerLinkActive="bg-indigo-800 text-white"
          class="flex items-center gap-3 px-3 py-2.5 rounded-lg transition hover:bg-indigo-800 hover:text-white">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Meal Plan
        </a>
      </li>
      <li>
        <a routerLink="/app/inventory" routerLinkActive="bg-indigo-800 text-white"
          class="flex items-center gap-3 px-3 py-2.5 rounded-lg transition hover:bg-indigo-800 hover:text-white">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
          Inventory
        </a>
      </li>
      <li>
        <a routerLink="/app/shopping-list" routerLinkActive="bg-indigo-800 text-white"
          class="flex items-center gap-3 px-3 py-2.5 rounded-lg transition hover:bg-indigo-800 hover:text-white">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          Shopping List
        </a>
      </li>
    </ul>

    <!-- Bottom nav -->
    <ul class="flex flex-col gap-1 px-3 py-4 border-t border-indigo-800">
      <li>
        <a routerLink="/app/friends" routerLinkActive="bg-indigo-800 text-white"
          class="flex items-center gap-3 px-3 py-2.5 rounded-lg transition hover:bg-indigo-800 hover:text-white">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Friends
        </a>
      </li>
      <li>
        <a routerLink="/app/settings" routerLinkActive="bg-indigo-800 text-white"
          class="flex items-center gap-3 px-3 py-2.5 rounded-lg transition hover:bg-indigo-800 hover:text-white">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          Settings
        </a>
      </li>
      <li>
        <a routerLink="/login" (click)="logout()"
          class="flex items-center gap-3 px-3 py-2.5 rounded-lg transition hover:bg-indigo-800 hover:text-white cursor-pointer">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Log Out
        </a>
      </li>
    </ul>
  </nav>

  <!-- ===================== MOBILE LAYOUT ===================== -->

  <!-- Mobile top bar -->
  <div class="md:hidden fixed top-0 left-0 right-0 z-30 flex items-center justify-end px-4 py-3 bg-indigo-950">
    <button (click)="menuOpen = !menuOpen" class="text-indigo-200 p-1 rounded focus:outline-none">
      <!-- Hamburger / close icon -->
      @if(!menuOpen) {
        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      } @else {
        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      }
    </button>
  </div>

  <!-- Mobile hamburger drawer -->
  <!-- Backdrop -->
  <div class="md:hidden fixed inset-0 z-20 bg-black/40 transition-opacity duration-300"
    [class.opacity-0]="!menuOpen"
    [class.pointer-events-none]="!menuOpen"
    (click)="menuOpen = false"></div>
  <!-- Drawer -->
  <div class="md:hidden fixed top-0 right-0 bottom-0 z-30 w-64 bg-indigo-950 text-indigo-200 flex flex-col pt-16 transition-transform duration-300"
    [class.translate-x-full]="!menuOpen">
      <button (click)="menuOpen = false" class="absolute top-3 right-4 text-indigo-200 p-1 rounded focus:outline-none">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div class="px-6 py-4 border-b border-indigo-800">
        <p class="text-xs uppercase tracking-widest text-indigo-400 mb-1">Logged in as</p>
        <p class="text-white font-semibold truncate">{{ username }}</p>
      </div>
      <ul class="flex flex-col gap-1 px-3 py-4 flex-1">
        <li>
          <a routerLink="/app/friends" routerLinkActive="bg-indigo-800 text-white" (click)="menuOpen = false"
            class="flex items-center gap-3 px-3 py-2.5 rounded-lg transition hover:bg-indigo-800 hover:text-white">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            Friends
          </a>
        </li>
        <li>
          <a routerLink="/app/settings" routerLinkActive="bg-indigo-800 text-white" (click)="menuOpen = false"
            class="flex items-center gap-3 px-3 py-2.5 rounded-lg transition hover:bg-indigo-800 hover:text-white">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            Settings
          </a>
        </li>
      </ul>
      <ul class="px-3 py-4 border-t border-indigo-800">
        <li>
          <a routerLink="/login" (click)="logout(); menuOpen = false"
            class="flex items-center gap-3 px-3 py-2.5 rounded-lg transition hover:bg-indigo-800 hover:text-white cursor-pointer">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Log Out
          </a>
        </li>
      </ul>
  </div>


  <!-- Mobile bottom nav (icons only) -->
  <nav class="md:hidden fixed bottom-0 left-0 right-0 z-20 flex justify-around items-center bg-indigo-950 border-t border-indigo-800 py-2">
    <a routerLink="/app/discover" routerLinkActive="text-white" class="flex flex-col items-center p-2 text-indigo-400 transition hover:text-white">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>
    </a>
    <a routerLink="/app/saved" routerLinkActive="text-white" class="flex flex-col items-center p-2 text-indigo-400 transition hover:text-white">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
    </a>
    <a routerLink="/app/meal-plan" routerLinkActive="text-white" class="flex flex-col items-center p-2 text-indigo-400 transition hover:text-white">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    </a>
    <a routerLink="/app/inventory" routerLinkActive="text-white" class="flex flex-col items-center p-2 text-indigo-400 transition hover:text-white">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
    </a>
    <a routerLink="/app/shopping-list" routerLinkActive="text-white" class="flex flex-col items-center p-2 text-indigo-400 transition hover:text-white">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
    </a>
  </nav>

  <!-- Main content -->
  <main class="flex-1 overflow-y-auto md:pt-0 pt-12 pb-16 md:pb-0">
    <router-outlet></router-outlet>
  </main>

</div>
