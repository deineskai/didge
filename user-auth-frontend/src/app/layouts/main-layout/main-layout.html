<div class="flex h-screen bg-gray-100">

  <!-- ===================== DESKTOP SIDEBAR ===================== -->
  <nav class="hidden md:flex flex-col w-64 bg-indigo-950 text-indigo-200 shrink-0">

    <!-- Username -->
    <div class="px-6 py-6 border-b border-indigo-800">
      <p class="text-xs uppercase tracking-widest text-indigo-400 mb-1">Logged in as</p>
      <p class="text-white font-semibold truncate">{{ username }}</p>
    </div>

    <!-- Main nav -->
    <ul class="flex flex-col gap-1 px-3 py-4 flex-1">
      <li>
        <a routerLink="/app/recipes/discover" routerLinkActive="bg-indigo-800 text-white"
          class="flex items-center gap-3 px-3 py-2.5 rounded-lg transition hover:bg-indigo-800 hover:text-white">
          <app-icon name="discover" class="text-indigo-400"/>
          Discover
        </a>
      </li>
      <li>
        <a routerLink="/app/recipes/saved" routerLinkActive="bg-indigo-800 text-white"
          class="flex items-center gap-3 px-3 py-2.5 rounded-lg transition hover:bg-indigo-800 hover:text-white">
          <app-icon name="saved" class="text-indigo-400"/>
          Saved
        </a>
      </li>
      <li>
        <a routerLink="/app/household/meal-plan" routerLinkActive="bg-indigo-800 text-white"
          class="flex items-center gap-3 px-3 py-2.5 rounded-lg transition hover:bg-indigo-800 hover:text-white">
          <app-icon name="meal-plan" class="text-indigo-400"/>
          Meal Plan
        </a>
      </li>
      <li>
        <a routerLink="/app/household/inventory" routerLinkActive="bg-indigo-800 text-white"
          class="flex items-center gap-3 px-3 py-2.5 rounded-lg transition hover:bg-indigo-800 hover:text-white">
          <app-icon name="inventory" class="text-indigo-400"/>
          Inventory
        </a>
      </li>
      <li>
        <a routerLink="/app/household/shopping-list" routerLinkActive="bg-indigo-800 text-white"
          class="flex items-center gap-3 px-3 py-2.5 rounded-lg transition hover:bg-indigo-800 hover:text-white">
          <app-icon name="shopping-list" class="text-indigo-400"/>
          Shopping List
        </a>
      </li>
    </ul>

    <!-- Bottom nav -->
    <ul class="flex flex-col gap-1 px-3 py-4 border-t border-indigo-800">
      <li>
        <a routerLink="/app/friends" routerLinkActive="bg-indigo-800 text-white"
          class="flex items-center gap-3 px-3 py-2.5 rounded-lg transition hover:bg-indigo-800 hover:text-white">
          <app-icon name="friends" class="text-indigo-400"/>
          Friends
        </a>
      </li>
      <li>
        <a routerLink="/app/households" routerLinkActive="bg-indigo-800 text-white"
          class="flex items-center gap-3 px-3 py-2.5 rounded-lg transition hover:bg-indigo-800 hover:text-white">
          <app-icon name="households" class="text-indigo-400"/>
          Households
        </a>
      </li>
      <li>
        <a routerLink="/app/settings" routerLinkActive="bg-indigo-800 text-white"
          class="flex items-center gap-3 px-3 py-2.5 rounded-lg transition hover:bg-indigo-800 hover:text-white">
          <app-icon name="settings" class="text-indigo-400"/>
          Settings
        </a>
      </li>
      <li>
        <a routerLink="/login" (click)="logout()"
          class="flex items-center gap-3 px-3 py-2.5 rounded-lg transition hover:bg-indigo-800 hover:text-white cursor-pointer">
          <app-icon name="logout" class="text-indigo-400"/>
          Log Out
        </a>
      </li>
    </ul>
  </nav>

  <!-- ===================== MOBILE LAYOUT ===================== -->

  <!-- Mobile top bar -->
  <div class="md:hidden fixed top-0 left-0 right-0 z-30 flex items-center justify-end px-4 py-3 bg-indigo-950">
    <button (click)="menuOpen = !menuOpen" class="text-indigo-200 p-1 rounded focus:outline-none">
      @if(!menuOpen) {
        <app-icon name="hamburger" size="md" [strokeWidth]="2"/>
      } @else {
        <app-icon name="close" size="md" [strokeWidth]="2"/>
      }
    </button>
  </div>

  <!-- Mobile hamburger drawer -->
  <!-- Backdrop -->
  <div class="md:hidden fixed inset-0 z-20 bg-black/40 transition-opacity duration-300"
    [class.opacity-0]="!menuOpen"
    [class.pointer-events-none]="!menuOpen"
    (click)="menuOpen = false"></div>
  <!-- Drawer -->
  <div class="md:hidden fixed top-0 right-0 bottom-0 z-30 w-64 bg-indigo-950 text-indigo-200 flex flex-col pt-16 transition-transform duration-300"
    [class.translate-x-full]="!menuOpen">
    <button (click)="menuOpen = false" class="absolute top-3 right-4 text-indigo-200 p-1 rounded focus:outline-none">
      <app-icon name="close" size="md" [strokeWidth]="2"/>
    </button>
    <div class="px-6 py-4 border-b border-indigo-800">
      <p class="text-xs uppercase tracking-widest text-indigo-400 mb-1">Logged in as</p>
      <p class="text-white font-semibold truncate">{{ username }}</p>
    </div>
    <ul class="flex flex-col gap-1 px-3 py-4 flex-1">
      <li>
        <a routerLink="/app/friends" routerLinkActive="bg-indigo-800 text-white" (click)="menuOpen = false"
          class="flex items-center gap-3 px-3 py-2.5 rounded-lg transition hover:bg-indigo-800 hover:text-white">
          <app-icon name="friends" class="text-indigo-400"/>
          Friends
        </a>
      </li>
      <li>
        <a routerLink="/app/households" routerLinkActive="bg-indigo-800 text-white" (click)="menuOpen = false"
          class="flex items-center gap-3 px-3 py-2.5 rounded-lg transition hover:bg-indigo-800 hover:text-white">
          <app-icon name="households" class="text-indigo-400"/>
          Households
        </a>
      </li>
      <li>
        <a routerLink="/app/settings" routerLinkActive="bg-indigo-800 text-white" (click)="menuOpen = false"
          class="flex items-center gap-3 px-3 py-2.5 rounded-lg transition hover:bg-indigo-800 hover:text-white">
          <app-icon name="settings" class="text-indigo-400"/>
          Settings
        </a>
      </li>
    </ul>
    <ul class="px-3 py-4 border-t border-indigo-800">
      <li>
        <a routerLink="/login" (click)="logout(); menuOpen = false"
          class="flex items-center gap-3 px-3 py-2.5 rounded-lg transition hover:bg-indigo-800 hover:text-white cursor-pointer">
          <app-icon name="logout" class="text-indigo-400"/>
          Log Out
        </a>
      </li>
    </ul>
  </div>

  <!-- Mobile bottom nav (icons only) -->
  <nav class="md:hidden fixed bottom-0 left-0 right-0 z-20 flex justify-around items-center bg-indigo-950 border-t border-indigo-800 py-2">
    <a routerLink="/app/recipes/discover" routerLinkActive="text-white" class="flex flex-col items-center p-2 text-indigo-400 transition hover:text-white">
      <app-icon name="discover" size="md"/>
    </a>
    <a routerLink="/app/recipes/saved" routerLinkActive="text-white" class="flex flex-col items-center p-2 text-indigo-400 transition hover:text-white">
      <app-icon name="saved" size="md"/>
    </a>
    <a routerLink="/app/household/meal-plan" routerLinkActive="text-white" class="flex flex-col items-center p-2 text-indigo-400 transition hover:text-white">
      <app-icon name="meal-plan" size="md"/>
    </a>
    <a routerLink="/app/household/inventory" routerLinkActive="text-white" class="flex flex-col items-center p-2 text-indigo-400 transition hover:text-white">
      <app-icon name="inventory" size="md"/>
    </a>
    <a routerLink="/app/household/shopping-list" routerLinkActive="text-white" class="flex flex-col items-center p-2 text-indigo-400 transition hover:text-white">
      <app-icon name="shopping-list" size="md"/>
    </a>
  </nav>

  <!-- Main content -->
  <main class="flex-1 overflow-y-auto md:pt-0 pt-12 pb-16 md:pb-0">
    <router-outlet></router-outlet>
  </main>

</div>
