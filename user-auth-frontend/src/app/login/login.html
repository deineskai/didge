<div class="bg-white px-8 py-10 rounded-2xl w-full max-w-[480px] shadow-[0_10px_25px_rgba(0,0,0,0.15)] text-center">
  <h2 class="text-2xl font-bold mb-1">Welcome Back 👋</h2>
  <p class="text-gray-500 text-sm mb-6">Login to your account</p>

  <form [formGroup]="loginForm" (ngSubmit)="onLogin()">

    <div class="text-left mb-4">
      <label class="block text-sm font-semibold mb-1">Username</label>
      <input type="text" formControlName="username" placeholder="Enter your username"
        class="w-full px-3 py-2 rounded-lg border border-gray-300 text-[0.95rem] transition focus:outline-none focus:border-indigo-600 focus:ring-2 focus:ring-indigo-200">
    </div>

    <div class="text-left mb-4">
      <label class="block text-sm font-semibold mb-1">Password</label>
      <input type="password" formControlName="password" placeholder="Enter your password"
        class="w-full px-3 py-2 rounded-lg border border-gray-300 text-[0.95rem] transition focus:outline-none focus:border-indigo-600 focus:ring-2 focus:ring-indigo-200">
    </div>

    @if(loginError) {
      <p class="text-red-600 text-xs text-left -mt-2 mb-2">{{ loginError }}</p>
    }

    <button type="submit"
      class="w-full mt-4 py-3 border-none rounded-lg bg-indigo-600 text-white font-semibold cursor-pointer transition hover:bg-indigo-700">
      Sign In
    </button>
  </form>

  <p class="mt-4 text-sm">
    Don't have an account?
    <a routerLink="/register" class="text-indigo-600 font-semibold no-underline hover:underline">Register here</a>
  </p>
</div>
