<div class="bg-white px-8 py-10 rounded-2xl w-full max-w-[480px] shadow-[0_10px_25px_rgba(0,0,0,0.15)] text-center">
  <h2 class="text-2xl font-bold mb-1">Create Account ✨</h2>
  <p class="text-gray-500 text-sm mb-6">Sign up to get started</p>

  <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">

    <div class="text-left mb-4">
      <label class="block text-sm font-semibold mb-1">Username</label>
      <input formControlName="username" placeholder="Enter username" type="text"
        class="w-full px-3 py-2 rounded-lg border border-gray-300 text-[0.95rem] transition focus:outline-none focus:border-indigo-600 focus:ring-2 focus:ring-indigo-200">
    </div>

    <div class="text-left mb-4">
      <label class="block text-sm font-semibold mb-1">Password</label>
      <input formControlName="password" placeholder="Enter password" type="password"
        class="w-full px-3 py-2 rounded-lg border border-gray-300 text-[0.95rem] transition focus:outline-none focus:border-indigo-600 focus:ring-2 focus:ring-indigo-200">
    </div>

    <div class="text-left mb-4">
      <label class="block text-sm font-semibold mb-1">Confirm Password</label>
      <input formControlName="confirmPassword" placeholder="Repeat password" type="password"
        class="w-full px-3 py-2 rounded-lg border border-gray-300 text-[0.95rem] transition focus:outline-none focus:border-indigo-600 focus:ring-2 focus:ring-indigo-200">
    </div>

    @if(registerForm.errors?.['passwordMismatch'] && registerForm.touched) {
      <p class="text-red-600 text-xs text-left -mt-2 mb-2">Passwords do not match</p>
    }

    <button
      type="submit"
      [disabled]="registerForm.invalid"
      class="w-full mt-4 py-3 border-none rounded-lg bg-indigo-600 text-white font-semibold cursor-pointer transition hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed">
      Create Account
    </button>

  </form>

  <p class="mt-4 text-sm">
    Already have an account?
    <a routerLink="/login" class="text-indigo-600 font-semibold no-underline hover:underline">Login</a>
  </p>
</div>
