services:
  user-service:
    image: ghcr.io/deineskai/didge/didge-user-service:${IMAGE_TAG}
    container_name: didge-user-service
    ports:
      - "127.0.0.1:${USER_SERVICE_PORT}:8000"
    restart: always
    environment:
      - DATABASE_URL=sqlite:////data/users.db
    volumes:
      - ./db:/data

  household-service:
    image: ghcr.io/deineskai/didge/didge-household-service:${IMAGE_TAG}
    container_name: didge-household-service
    ports:
      - "127.0.0.1:${HOUSEHOLD_SERVICE_PORT}:8000"
    restart: always
    environment:
      - DATABASE_URL=sqlite:////data/households.db
    volumes:
      - ./db:/data

  frontend:
    image: ghcr.io/deineskai/didge/didgefrontend:${IMAGE_TAG}
    container_name: didge-frontend
    ports:
      - "127.0.0.1:${FRONTEND_PORT}:80"
    restart: always
    # environment:
    #  - USER_API_URL=url
    #  - HOUSEHOLD_API_URL=url
