<div class="relative flex items-center max-w-auto">
  <button
    type="button"
    (click)="decrease()"
    id="decrement-button"
    data-input-counter-decrement="quantity-input"
    class="bg-gray-100 dark:bg-gray-700 dark:hover:bg-gray-600 dark:border-gray-600 hover:bg-gray-200 border border-gray-300 rounded-s-lg p-3 h-11"
  >
    <svg
      class="w-3 h-3 text-gray-900 dark:text-white"
      aria-hidden="true"
      xmlns="http://www.w3.org/2000/svg"
      fill="none"
      viewBox="0 0 18 2"
    >
      <path
        stroke="currentColor"
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M1 1h16"
      />
    </svg>
  </button>
  <input
    type="number"
    id="quantity-input"
    data-input-counter
    aria-describedby="helper-text-explanation"
    class="bg-gray-50 border-x-0 border-gray-300 h-11 text-center text-gray-900 text-sm block w-full py-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white"
    placeholder="999"
    required
    [value]="value"
    (input)="onInputChange($event)"
  />
  <button
    type="button"
    (click)="increase()"
    id="increment-button"
    data-input-counter-increment="quantity-input"
    class="bg-gray-100 dark:bg-gray-700 dark:hover:bg-gray-600 dark:border-gray-600 hover:bg-gray-200 border border-gray-300 rounded-e-lg p-3 h-11"
  >
    <svg
      class="w-3 h-3 text-gray-900 dark:text-white"
      aria-hidden="true"
      xmlns="http://www.w3.org/2000/svg"
      fill="none"
      viewBox="0 0 18 18"
    >
      <path
        stroke="currentColor"
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M9 1v16M1 9h16"
      />
    </svg>
  </button>
</div>
