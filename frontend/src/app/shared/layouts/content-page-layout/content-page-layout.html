<!-- Cover Image -->
@if (coverImageSource != null) {
  <div class="relative inline-block max-h-80 w-full overflow-hidden">
    <img src="{{ coverImageSource }}" class="w-full h-[25vh] object-cover" alt="Cover Image" />
  </div>
} @else {
  <div class="relative inline-block h-14 max-h-80 w-full overflow-hidden"></div>
}

<!-- Header Bar -->
<div
  class="fixed top-0 left-0 sm:left-64 right-0 h-14 transition-all duration-250 ease-in-out flex z-20 scroll-appearance"
  [class.bg-gray-50]="isScrolled"
  [class.dark:bg-gray-900]="isScrolled"
  [class.bg-transparent]="!isScrolled"
  [class.no-transition]="!isScrolled"
  [class.shadow-sm]="isScrolled"
>
  <div class="flex justify-between items-center w-full">
    <!-- Left -->
    <div class="flex items-center">
      <!-- Sidebar Toggle -->
      <app-round-button
        [transparent]="coverImageSource === null || isScrolled"
        class="ml-6 my-3 sm:hidden transition-none"
      >
        <app-icon
          (click)="layoutService.toggleSidebar()"
          name="chevron-left"
          fill="none"
          [class.hidden]="layoutService.isSidebarOpen()"
          [stroke]="coverImageSource != null && !isScrolled ? '#fff' : 'currentColor'"
        />
      </app-round-button>
      <!-- Page Title -->
      <div
        class="ml-2 sm:ml-8 transition-all duration-250 ease-in-out"
        [class.opacity-0]="!isScrolled"
        [class.opacity-100]="isScrolled"
        [class.no-transition]="!isScrolled"
      >
        <h1 class="text-md font-regular">
          {{ title }}
        </h1>
      </div>
    </div>
    <!-- Right -->
    <div class="flex gap-4 mx-6 my-3">
      <!-- Share Button -->
      <app-round-button
        [transparent]="coverImageSource === null || isScrolled"
        class="transition-none"
      >
        <div class="w-8 h-8 flex items-center justify-center">
          <app-icon
            name="share"
            fill="none"
            class="w-6 h-6"
            [stroke]="coverImageSource != null && !isScrolled ? '#fff' : 'currentColor'"
          />
        </div>
      </app-round-button>
      <!-- More Button -->
      <app-round-button
        [transparent]="coverImageSource === null || isScrolled"
        class="transition-none"
      >
        <app-icon
          name="more"
          [strokeWidth]="2"
          fill="none"
          [stroke]="coverImageSource != null && !isScrolled ? '#fff' : 'currentColor'"
        />
      </app-round-button>
    </div>
  </div>
</div>

<!-- Main Content -->
<div class="p-8">
  <!-- Emoji Page Icon and Picker -->
  @if (emojiId != null) {
    <div class="relative">
      <!-- Emoji Page Icon -->
      <button
        type="button"
        class="text-6xl absolute top-0 left-0 -translate-x-2 -translate-y-12 z-10 p-2"
        [class.-translate-y-20]="coverImageSource != null"
        [class.sm:-translate-y-16]="coverImageSource == null"
        cdkOverlayOrigin
        #trigger="cdkOverlayOrigin"
        (click)="showEmojiPicker = !showEmojiPicker"
      >
        <ngx-emoji
          [emoji]="emojiId"
          [set]="layoutService.isAppleDevice() ? '' : 'twitter'"
          [isNative]="false"
          [size]="64"
        >
        </ngx-emoji>
      </button>

      <!-- Emoji Picker-->
      <ng-template
        cdkConnectedOverlay
        [cdkConnectedOverlayScrollStrategy]="blockScrollStrategy"
        [cdkConnectedOverlayPanelClass]="['mobile-emoji-picker', 'desktop-emoji-picker']"
        backdropClass="cdk-overlay-transparent-backdrop"
        [cdkConnectedOverlayOrigin]="trigger"
        [cdkConnectedOverlayOpen]="showEmojiPicker"
        [cdkConnectedOverlayHasBackdrop]="true"
        (backdropClick)="showEmojiPicker = false"
        (detach)="showEmojiPicker = false"
      >
        <div class="picker-wrapper">
          <emoji-mart
            [set]="layoutService.isAppleDevice() ? '' : 'twitter'"
            [style]="{ width: '100vw', maxWidth: '400px' }"
            (emojiSelect)="setEmoji($event); showEmojiPicker = false"
          >
          </emoji-mart>
        </div>
      </ng-template>
    </div>
  }

  <div class="h-8"></div>
  <p>twitter</p>
  <ngx-emoji [emoji]="'grinning'" [set]="'twitter'" [isNative]="false" [size]="64"> </ngx-emoji>

  <p>empty</p>
  <ngx-emoji [emoji]="'grinning'" [set]="''" [isNative]="false" [size]="64"> </ngx-emoji>

  <p>none</p>
  <ngx-emoji [emoji]="'grinning'" [isNative]="false" [size]="64"> </ngx-emoji>

  <div class="sticky top-0 bg-gray-50 dark:bg-gray-900 pb-6 flex items-center justify-between">
    <!-- Page Title -->
    <h1 class="text-2xl font-bold">{{ title }}</h1>
    <!-- Page Actions (e.g. Buttons)-->
    <div class="flex items-center gap-2">
      <ng-content select="[pageActions]"></ng-content>
    </div>
  </div>
  <!-- Actual Page Content -->
  <div class="overflow-hidden">
    <ng-content></ng-content>
  </div>
</div>
